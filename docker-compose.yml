version: '3.8'

services:
  bms-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bms-monitor
    restart: unless-stopped
    
    # 映射串口设备 - 使用privileged模式以访问所有CH341设备
    # 这样即使设备不存在，容器也能正常启动
    # 如果设备存在，程序会自动找到并使用
    privileged: true
    
    # 挂载配置文件和日志目录
    volumes:
      - ./config:/app/config:ro  # 配置文件只读挂载
      - ./logs:/app/logs         # 日志目录读写挂载
    
    # 环境变量（可选，用于覆盖配置）
    environment:
      - TZ=Asia/Shanghai
      # - SERIAL_PORT=/dev/ttyCH341USB0  # 如果需要通过环境变量指定串口
    
    # 网络模式（如果需要访问宿主机网络）
    network_mode: host
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # BMS 扫描服务（可选，用于一次性扫描）
  bms-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bms-scanner
    profiles:
      - scanner  # 使用 profile 控制，默认不启动
    
    # 使用privileged模式以访问所有CH341设备
    privileged: true
    
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    
    environment:
      - TZ=Asia/Shanghai
    
    command: ["python", "-m", "src.bms_scanner", "/app/config/config.yaml"]
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


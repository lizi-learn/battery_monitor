# BMS 监测系统配置文件

# 串口配置
serial:
  port: "/dev/ttyCH341USB0"  # 串口设备路径，可根据实际情况修改
  baudrate: 9600
  bytesize: 8
  parity: "N"
  stopbits: 1
  timeout: 0.5

# Modbus 配置
modbus:
  address: 0x0B  # 设备地址

# 日志配置
logging:
  log_dir: "logs"
  log_file: "bms_monitor.log"
  scan_log_file: "bms_scan.log"
  max_log_size: 204800  # 200KB，单位：字节
  log_rotation: true

# 监测配置
monitor:
  scan_interval: 5  # 扫描间隔（秒）
  
# 安全阈值配置
thresholds:
  pack_voltage:
    max: 58.4  # V
    min: 40.0  # V
  temperature:
    max: 60.0  # ℃
    min: 0.0   # ℃
  soc:
    low: 5     # %
    high: 100  # %

# 寄存器地址映射（参考通信协议）
registers:
  pack_info_start: 0x0400
  pack_info_count: 0x16
  cell_voltage_start: 0x0800
  cell_voltage_count: 16
  temperature_start: 0x0C00
  temperature_count: 4
  status_start: 0x1000
  status_count: 3

# 版本管理和自动更新配置
version:
  # 是否启用自动更新（开发机配置，部署机读取此配置决定是否自动更新）
  auto_update_enabled: false  # true: 启用自动更新, false: 禁用自动更新
  # 版本检查间隔（秒），部署机轮询间隔
  check_interval: 300  # 默认5分钟检查一次
  # 版本信息文件路径（相对于项目根目录）
  version_file: "VERSION.json"
  # 特殊标志配置（开发机设置，用于标识特定功能或代码）
  flags:
    # 示例标志，可根据需要添加
    # critical_update: false  # 关键更新标志
    # feature_enabled: true   # 功能启用标志
    # experimental: false     # 实验性功能标志

